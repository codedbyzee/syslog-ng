# =============================================================================
# Grafana Datasource — ClickHouse
# =============================================================================
# Provisioned automatically on Grafana startup.
# Uses the grafana-clickhouse-datasource plugin.
# =============================================================================

apiVersion: 1

datasources:
  - name: ClickHouse
    uid: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    isDefault: true
    editable: false
    jsonData:
      server: clickhouse
      port: 8123
      protocol: http
      database: ipdr
      username: grafana
      tlsAuth: false
      tlsSkipVerify: false
      defaultDatabase: ipdr
      dialTimeout: 10
      queryTimeout: 60
      httpHeaders: []
    secureJsonData:
      password: ""
    version: 5
