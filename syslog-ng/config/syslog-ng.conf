@version: 4.2
@module kafka

# ── Local UDP source (LAN devices) ────────────────────────────────────
# Note: no-parse keeps the full raw syslog message intact,
# preserving RFC 5424 structured data [nsess ...]
source s_udp {
    network(
        ip("0.0.0.0")
        port(514)
        transport("udp")
        flags(no-parse)
    );
};

# ── TLS source (WAN/internet devices, encrypted) ─────────────────────
source s_tls {
    network(
        ip("0.0.0.0")
        port(6514)
        transport("tls")
        tls(
            key_file("/etc/syslog-ng/config/tls/server.key")
            cert_file("/etc/syslog-ng/config/tls/server.crt")
        )
        flags(no-parse)
    );
};

destination d_kafka {
    kafka_c(
        bootstrap-servers("kafka:9092")
        topic("ipdr-events")
    );
};

log {
    source(s_udp);
    source(s_tls);
    destination(d_kafka);
};
