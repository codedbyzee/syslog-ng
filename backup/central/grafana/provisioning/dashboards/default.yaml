# =============================================================================
# Grafana Dashboard Provisioning
# =============================================================================
# Automatically loads all dashboard JSON files from the dashboards directory.
# =============================================================================

apiVersion: 1

providers:
  - name: IPDR Dashboards
    orgId: 1
    folder: IPDR
    folderUid: ipdr
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
