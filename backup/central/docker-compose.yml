# =============================================================================
# IPDR Platform — Central Stack
# =============================================================================
# Deploy in central data center.
# ClickHouse + Grafana — receives IPDR data from per-site Kafka instances.
# =============================================================================

name: ipdr-central

services:
  # ---------------------------------------------------------------------------
  # ClickHouse — columnar OLAP database for IPDR log storage and analytics
  # Connects to per-site Kafka brokers via Kafka engine tables.
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: clickhouse
    restart: unless-stopped
    networks:
      - ipdr-net
    ports:
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_INTERSERVER_PORT:-9009}:9009"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:?required}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:?required}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?required}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    stop_grace_period: 60s
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-log:/var/log/clickhouse-server
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user ${CLICKHOUSE_USER} --password ${CLICKHOUSE_PASSWORD} --query 'SELECT 1' > /dev/null 2>&1 || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Grafana — metrics dashboards and alerting
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    networks:
      - ipdr-net
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS:-grafana-clickhouse-datasource}
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS:-false}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# =============================================================================
# Networks
# =============================================================================
networks:
  ipdr-net:
    name: ipdr-shared
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  clickhouse-data:
    name: ipdr-clickhouse-data-central
    driver: local

  clickhouse-log:
    name: ipdr-clickhouse-log-central
    driver: local

  grafana-data:
    name: ipdr-grafana-data-central
    driver: local
