# =============================================================================
# IPDR Platform — Per-Site Stack
# =============================================================================
# Deploy at each physical location.
# syslog-ng + Kafka (1 node KRaft) — forwards to central ClickHouse.
#
# Required env vars:
#   SITE_ID       - Unique identifier (e.g., site-a, site-b)
#   SITE_HOST     - External hostname/IP for Kafka (central ClickHouse connects here)
#   KAFKA_CLUSTER_ID - Unique KRaft cluster ID
# =============================================================================

name: ipdr-${SITE_ID:?required}

services:
  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode) — message broker
  # Single node (broker + controller). Tiny footprint (~512MB RAM).
  # Exposes EXTERNAL listener for central ClickHouse to connect.
  # ---------------------------------------------------------------------------
  kafka:
    build:
      context: ./kafka
      dockerfile: Dockerfile
    container_name: kafka
    restart: unless-stopped
    networks:
      - ipdr-net
    ports:
      - "${KAFKA_INTERNAL_PORT:-9092}:9092"
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
      - "${KAFKA_CONTROLLER_PORT:-9093}:9093"
    environment:
      # ── KRaft mode ──────────────────────────────────────────────────────────
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      # ── Listeners ──────────────────────────────────────────────────────────
      # INTERNAL:9092 — for syslog-ng on Docker network
      # EXTERNAL:9094 — for central ClickHouse (over WAN)
      # CONTROLLER:9093 — for KRaft metadata
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${SITE_HOST:?required}:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # ── Topic defaults ─────────────────────────────────────────────────────
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # ── Auto topic creation ────────────────────────────────────────────────
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

      # ── Data directory ─────────────────────────────────────────────────────
      KAFKA_LOG_DIRS: /opt/kafka/data

      # ── Log retention (3 days — enough for WAN recovery) ───────────────────
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: -1
      KAFKA_LOG_SEGMENT_BYTES: 536870912

      # ── Compression (snappy for efficient WAN transfer) ────────────────────
      KAFKA_COMPRESSION_TYPE: snappy

      # ── Message size (10 MB max for IPDR payloads) ─────────────────────────
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760

      # ── Small footprint optimizations ──────────────────────────────────────
      KAFKA_NUM_NETWORK_THREADS: 3
      KAFKA_NUM_IO_THREADS: 4
      KAFKA_NUM_REPLICA_FETCHERS: 1
      KAFKA_BACKGROUND_THREADS: 4

      # ── JVM heap (tiny — ~512MB for single site) ───────────────────────────
      KAFKA_HEAP_OPTS: -Xmx512m -Xms512m
    volumes:
      - kafka-data:/opt/kafka/data
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # syslog-ng — syslog receiver, parser, and Kafka forwarder
  # Based on linuxserver/syslog-ng:4.10.2.
  # COLLECTOR_ID env var tags every record with the site identifier.
  # ---------------------------------------------------------------------------
  syslog-ng:
    build:
      context: ./syslog-ng
      dockerfile: Dockerfile
    container_name: syslog-ng
    restart: unless-stopped
    networks:
      - ipdr-net
    ports:
      - "${SYSLOG_UDP_PORT:-514}:514/udp"
      - "${SYSLOG_TCP_PORT:-514}:514"
      - "${SYSLOG_TLS_PORT:-6514}:6514"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Karachi}
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=ipdr-events
      - COLLECTOR_ID=${SITE_ID:?required}
    volumes:
      - ./syslog-ng/config:/config
      - syslog-ng-buffer:/var/lib/syslog-ng/kafka-buffer
    stop_grace_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "syslog-ng-ctl stats > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# =============================================================================
# Networks
# =============================================================================
networks:
  ipdr-net:
    name: ipdr-shared
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  kafka-data:
    name: kafka-data-${SITE_ID}
    driver: local

  syslog-ng-buffer:
    name: syslog-ng-buffer-${SITE_ID}
    driver: local
