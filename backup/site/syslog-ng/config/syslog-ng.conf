# =============================================================================
# syslog-ng Configuration — IPDR Collector
# =============================================================================
# Sources:      UDP 514, TCP 514, TLS 6514
# Parsers:      JSON, key=value (IPDR), CSV
# Enrichment:   timestamp normalization, hostname tagging
# Destinations: Kafka topic ipdr-events (JSON), local file fallback
# =============================================================================

@version: 4.2
@include "scl.conf"

# ---------------------------------------------------------------------------
# Global options
# ---------------------------------------------------------------------------
options {
    time_reap(30);
    mark_freq(3600);
    keep_hostname(yes);
    chain_hostnames(no);
    flush_lines(10000);
    flush_timeout(10000);
    log_fifo_size(10000000);
    stats_freq(60);
    bad_hostname("^gconfd$");
};

# ---------------------------------------------------------------------------
# Sources — accept IPDR syslog from network devices
# ---------------------------------------------------------------------------

# UDP syslog (standard)
source s_udp {
    syslog(
        ip(0.0.0.0)
        port(514)
        transport("udp")
        max-connections(500)
    );
};

# TCP syslog
source s_tcp {
    syslog(
        ip(0.0.0.0)
        port(514)
        transport("tcp")
        max-connections(500)
    );
};

# TLS-encrypted syslog
source s_tls {
    syslog(
        ip(0.0.0.0)
        port(6514)
        transport("tls")
        max-connections(500)
        tls(
            key_file("/config/tls/server.key")
            cert_file("/config/tls/server.crt")
            peer_verify(optional-untrusted)
        )
    );
};

# Internal syslog-ng messages
source s_internal {
    internal();
};

# ---------------------------------------------------------------------------
# Parsers — extract structured IPDR data from message payload
# ---------------------------------------------------------------------------
# Three parsers run in sequence on the raw $MESSAGE:
#   1. JSON        — attempts to parse as structured JSON
#   2. KV (IPDR)   — parses key=value pairs (e.g. src_ip=1.2.3.4 dst_port=80)
#   3. CSV (legacy)— parses comma-separated IPDR records
# ---------------------------------------------------------------------------

# Parser: JSON — structured IPDR messages in JSON format
parser p_json {
    json-parser(
        prefix(".json.")
    );
};

# Parser: key=value — IPDR messages in key=value format
# (e.g. "src_ip=10.0.0.1 dst_ip=10.0.0.2 proto=tcp bytes_in=1024")
parser p_kv {
    kv-parser(
        value-separator("=")
        pair-separator(" ")
        prefix(".ipdr.")
    );
};

# Parser: CSV — legacy IPDR comma-separated format
parser p_csv {
    csv-parser(
        delimiter(",")
        columns(
            "timestamp", "source_ip", "protocol", "src_port",
            "dst_ip", "dst_port", "bytes_in", "bytes_out",
            "duration", "status"
        )
        flags(escape-none)
    );
};

# ---------------------------------------------------------------------------
# Rewrite rules — enrich messages with metadata
# ---------------------------------------------------------------------------

# Ensure $HOST is always populated (fall back to $SOURCE_IP if empty)
rewrite r_set_hostname {
    set("${HOST:-${SOURCE_IP:-unknown}}" value("HOST"));
};

# Normalize timestamp: if the message carries a valid SYSLOG_TIMESTAMP,
# store it in a dedicated .ipdr.parsed_at field; also set $DATE for syslog-ng.
rewrite r_set_timestamp {
    set("${ISODATE}" value(".ipdr.parsed_at"));
};

# Set the syslog-ng collector identity (from COLLECTOR_ID env var)
rewrite r_set_collector {
    set("${ENV_COLLECTOR_ID:-unknown}" value(".ipdr.collector_id"));
};

# ---------------------------------------------------------------------------
# Template — JSON-formatted output for Kafka
# ---------------------------------------------------------------------------
# Produces a flat JSON object with:
#   - syslog metadata (hostname, facility, severity, timestamp)
#   - IPDR payload fields from whichever parser matched
# ---------------------------------------------------------------------------
template t_ipdr_json {
    template(
        "$(format-json "
            --scope selected_macros
            --scope syslog-proto
            --scope rfc5424
            --key HOST
            --key PROGRAM
            --key PID
            --key FACILITY
            --key SEVERITY
            --key DATE
            --key ISODATE
            --key MESSAGE
            --key .json.*
            --key .ipdr.*
            --key .csv.*
        ")"
    );
};

# ---------------------------------------------------------------------------
# Destinations
# ---------------------------------------------------------------------------

# Kafka destination — publish parsed IPDR logs as JSON
# Disk-buffer guarantees zero message loss during Kafka downtime.
# Reliable mode: messages are ACKed by syslog-ng only after Kafka confirms.
# Retries indefinitely; survives container and Kafka restarts.
destination d_kafka {
    kafka(
        bootstrap-servers("kafka:9092")
        topic("ipdr-events")
        key("$HOST")
        template(t_ipdr_json)
        disk-buffer(
            reliable(yes)
            disk-buf-size-in-bytes(2147483648)
            mem-buf-size-in-bytes(134217728)
            dir("/var/lib/syslog-ng/kafka-buffer")
        )
        flush_timeout_on_shutdown(120000)
        properties(
            "acks" => "all"
            "enable.idempotence" => "true"
            "max.in.flight.requests.per.connection" => "1"
            "retries" => "2147483647"
            "compression.type" => "snappy"
            "batch.size" => "65536"
            "linger.ms" => "500"
            "max.request.size" => "10485760"
        )
    );
};

# Local file fallback (when Kafka is unavailable)
destination d_file {
    file(
        "/config/log/ipdr-fallback-${YEAR}${MONTH}${DAY}.log"
        template("$ISODATE $HOST $MSG\n")
        create_dirs(yes)
    );
};

# Console output for debugging
destination d_console {
    file("/dev/stdout");
};

# ---------------------------------------------------------------------------
# Log paths — connect sources → parser → destinations
# ---------------------------------------------------------------------------

# IPDR structured logs → enrich → Kafka (JSON) + file fallback
log {
    source(s_udp);
    source(s_tcp);
    source(s_tls);

    # Parse — try JSON first, then KV, then CSV
    parser(p_json);
    parser(p_kv);
    parser(p_csv);

    # Enrich — add hostname, timestamp, collector identity
    rewrite(r_set_hostname);
    rewrite(r_set_timestamp);
    rewrite(r_set_collector);

    destination(d_kafka);
    destination(d_file);
    destination(d_console);
    flags(flow-control);
};

# Internal syslog-ng messages → console for Docker logging
log {
    source(s_internal);
    destination(d_console);
};
