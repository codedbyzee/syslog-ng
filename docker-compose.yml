# =============================================================================
# IPDR Platform — Combined Stack (all-in-one)
# =============================================================================
# Single-node deployment: syslog-ng → Kafka → ClickHouse → Grafana
# For multi-site, use central/ + site/ stacks instead.
# =============================================================================

name: ipdr

services:

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode) — message broker
  # ---------------------------------------------------------------------------
  kafka:
    build:
      context: ./kafka
      dockerfile: Dockerfile
    container_name: ipdr-kafka
    restart: unless-stopped
    networks:
      - ipdr-net
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-4}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_LOG_DIRS: /opt/kafka/data
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_RETENTION_HOURS:-72}
      KAFKA_COMPRESSION_TYPE: snappy
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_HEAP_OPTS: -Xmx${KAFKA_HEAP:-512}m -Xms${KAFKA_HEAP:-512}m
    volumes:
      - kafka-data:/opt/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # syslog-ng — syslog receiver, parser, and Kafka forwarder
  # ---------------------------------------------------------------------------
  syslog-ng:
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
    build:
      context: ./syslog-ng
      dockerfile: Dockerfile
    container_name: ipdr-syslog-ng
    restart: unless-stopped
    networks:
      - ipdr-net
    ports:
      - "${SYSLOG_UDP_PORT:-514}:514/udp"
      - "${SYSLOG_TCP_PORT:-514}:514"
      - "${SYSLOG_TLS_PORT:-6514}:6514"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Karachi}
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "syslog-ng-ctl stats > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # ClickHouse — columnar OLAP database
  # Kafka engine table reads from local Kafka automatically.
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: ipdr-clickhouse
    restart: unless-stopped
    networks:
      - ipdr-net
    ports:
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-ipdr}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-ipdr_user}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-ipdr_secret}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-log:/var/log/clickhouse-server
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER} --password ${CLICKHOUSE_PASSWORD} --query 'SELECT 1' > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Grafana — metrics dashboards and alerting
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: ipdr-grafana
    restart: unless-stopped
    networks:
      - ipdr-net
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS:-grafana-clickhouse-datasource}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  ipdr-net:
    name: ipdr-net
    driver: bridge

volumes:
  kafka-data:
    name: ipdr-kafka-data
  clickhouse-data:
    name: ipdr-clickhouse-data
  clickhouse-log:
    name: ipdr-clickhouse-log
  grafana-data:
    name: ipdr-grafana-data
